<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title class="ion-title">
      Chamada Fácil
      <ion-icon name="checkmark-done-circle-outline" style="vertical-align: middle; margin-right: 8px; font-size: 1.4rem;"></ion-icon>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="false" class="ion-padding">
  <div id="container">

    <div class="login-box">
      <h2>Acesso do Professor</h2>

      <ion-item>
        <ion-label position="floating">Usuário</ion-label>
        <ion-input type="text" [(ngModel)]="usuario"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Senha</ion-label>
        <ion-input type="password" [(ngModel)]="chave"></ion-input>
      </ion-item>

      <br>

      <ion-button class="button" expand="block" (click)="fazerLogin()">
        Entrar
      </ion-button>

      <p *ngIf="mensagem" style="text-align: center; color: #eb445a; font-weight: bold; margin-top: 20px;">
        {{ mensagem }}
      </p>
    </div>

  </div>
</ion-content>
